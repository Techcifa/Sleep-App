[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200

[[redirects]]
  from = "/api/deepseek"
  to = "/.netlify/functions/deepseek"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
